name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skill & templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check templates are in sync (no drift)
        run: node tools/sync-templates.mjs --check

      - name: Validate SKILL.md
        run: node tools/validate-skill.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke-test skill scripts
        run: npm run smoke

  test-cli:
    name: Test create-arc CLI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: packages/create-arc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run tests
        run: npm test

  package:
    name: Build .skill artifact
    runs-on: ubuntu-latest
    needs: [validate, test-cli]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package skill
        run: node tools/package-skill.mjs --out dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arc-skill
          path: dist/*.skill
          if-no-files-found: error
