name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write      # create releases + upload assets
  id-token: write      # npm provenance (OIDC)

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify tag matches package version
        working-directory: packages/create-arc
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package version $PKG — bump the version before tagging"
            exit 1
          fi
          echo "tag v$TAG == package version $PKG ✔"

      - name: Check template drift
        run: node tools/sync-templates.mjs --check

      - name: Validate SKILL.md
        run: node tools/validate-skill.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke-test skill scripts
        run: npm run smoke

      - name: Test CLI
        working-directory: packages/create-arc
        run: npm test

      - name: Package skill
        run: node tools/package-skill.mjs --out dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Publish @ksoftm/create-arc
        working-directory: packages/create-arc
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create release with .skill asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
