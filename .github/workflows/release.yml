name: Release

on:
  push:
    branches: [master]

# semantic-release runs as a single job: it analyzes commits, bumps the version,
# updates the changelog, publishes to npm, creates the GitHub Release with the
# .skill asset, and commits the version/changelog back — all in one run. There is
# no tag-triggered second workflow, so the GITHUB_TOKEN "won't re-trigger" limit
# does not apply here.
permissions:
  contents: write       # push the release commit + tag, create the GitHub Release
  issues: write         # comment on released issues
  pull-requests: write  # comment on released PRs
  id-token: write       # OIDC for npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    # Don't run on the release commit semantic-release itself pushes.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full history + tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22         # trusted publishing / provenance wants Node >= 22
          registry-url: "https://registry.npmjs.org"

      # --- quality gate: never release something that doesn't pass ---
      - name: Install workspace
        run: npm ci || npm install

      - name: Check template drift
        run: node tools/sync-templates.mjs --check

      - name: Validate SKILL.md
        run: node tools/validate-skill.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke-test skill scripts
        run: npm run smoke

      - name: Test CLI
        working-directory: packages/create-arc
        run: npm test

      # --- release ---
      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
