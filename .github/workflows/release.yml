name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write # push release commit + tag, create the GitHub Release
  issues: write # comment on released issues
  pull-requests: write # comment on released PRs

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    # Don't run on the release commit semantic-release itself pushes.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace
        run: npm ci || npm install

      # --- quality gate ---
      - name: Check template drift
        run: node tools/sync-templates.mjs --check

      - name: Validate SKILL.md
        run: node tools/validate-skill.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke-test skill scripts
        run: npm run smoke

      - name: Test CLI
        working-directory: packages/create-arc
        run: npm test

      # --- release (npm publish via NPM_TOKEN + GitHub Release) ---
      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
